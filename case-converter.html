<!DOCTYPE html>
<html>

<head>
    <title>ConvoTools - Case Converter</title>

    <link rel="icon" type="image/x-icon" href="img/ConvoTools-f.png">

    <style>
        body {
            font-family: Poppins;
            background: #f5f7fb;
            padding: 60px
        }

        textarea {
            width: 100%;
            height: 120px
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: #2563eb;
            color: #fff
        }
    </style>
</head>

<body>

    <h2>Case Converter</h2>

    <textarea id="input"></textarea>

    <button onclick="upper()">UPPERCASE</button>
    <button onclick="lower()">lowercase</button>

    <textarea id="output"></textarea>

    <script>
        function upper() { output.value = input.value.toUpperCase(); }
        function lower() { output.value = input.value.toLowerCase(); }
    </script>

</body>

</html>
