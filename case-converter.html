<!DOCTYPE html>
<html>

<head>
    <title>ConvoTools - Case Converter</title>

    <link rel="icon" type="image/x-icon" href="img/ConvoTools.in.png">

    <style>
        body {
            font-family: Poppins;
            background: #f5f7fb;
            padding: 60px
        }

        textarea {
            width: 100%;
            height: 120px
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: #2563eb;
            color: #fff
        }
    </style>
</head>

<body>
    <header>

    <a class="logo" href="./index.html">
      <img src="img/convoTools.gif" alt="ConvoTools" style="width: 150px; border-radius: 5px;">
    </a>

    <nav>
      <a href="./index.html">Home</a>
      <!-- <a href="https://www.buymeacoffee.com/convotools" target="_blank">
        Buy me a coffee
      </a> -->
    </nav>

  </header>

    <h2>Case Converter</h2>

    <textarea id="input"></textarea>

    <button onclick="upper()">UPPERCASE</button>
    <button onclick="lower()">lowercase</button>

    <textarea id="output"></textarea>

    <script>
        function upper() { output.value = input.value.toUpperCase(); }
        function lower() { output.value = input.value.toLowerCase(); }
    </script>

</body>

</html>
