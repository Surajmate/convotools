<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>ConvoTools - Excel to JSON</title>

    <link rel="icon" type="image/x-icon" href="img/ConvoTools-s.png">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.5/xlsx.full.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Poppins, sans-serif
    }

    body {
      background: #f5f7fb;
      color: #333
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 8%;
      background: white;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05)
    }

    .logo {
      font-size: 24px;
      font-weight: 700;
      color: #2563eb
    }

    nav a {
      margin-left: 25px;
      text-decoration: none;
      color: #444;
      font-weight: 500
    }

    .converter {
      padding: 40px 8%;
      /* background: white */
    }

    .converter h2 {
      text-align: center;
      margin-bottom: 30px
    }

    .convert-box {
      max-width: 900px;
      margin: auto;
      text-align: center
    }

    .convert-box input {
      padding: 12px;
      width: 100%;
      margin-bottom: 15px;
      border: 1px solid #ddd;
      border-radius: 6px
    }

    textarea {
      width: 100%;
      height: 380px;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      resize: none;
      font-family: monospace;
      margin-top: 10px
    }

    button {
      padding: 12px 25px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 10px
    }

    .clear-btn {
      background: #6b7280
    }

    footer {
      background: #111;
      color: #aaa;
      text-align: center;
      padding: 30px;
      margin-top: 60px
    }

    .loader {
      display: none;
      margin-top: 15px
    }

    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #2563eb;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      animation: spin 1s linear infinite;
      margin: 10px auto
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg)
      }

      100% {
        transform: rotate(360deg)
      }
    }
  </style>
</head>

<body>

  <header>

    <a class="logo" href="./index.html">
      <img src="img/ConvoTools-s.png" alt="ConvoTools" style="width:150px;">
    </a>

    <nav>
      <a href="./index.html">Home</a>
      <!-- <a href="https://www.buymeacoffee.com/convotools" target="_blank">
        Buy me a coffee
      </a> -->
    </nav>

  </header>


  <section class="converter">

    <h2>Excel to JSON Converter</h2>

    <div class="convert-box">

      <label style="display:block;margin-bottom:6px;font-weight:500">
        Upload Excel File
      </label>

      <input type="file" id="upload" accept=".xlsx,.xls" style="background-color: white;">

      <div class="loader" id="loader">
        <div class="spinner"></div>
        Converting...
      </div>

      <button onclick="clearData()" class="clear-btn">
        Clear Data
      </button>

      <textarea id="json-output" placeholder="JSON output will appear here..."></textarea>

    </div>

  </section>


  <footer>
    <p>© 2026 ConvoTools. All rights reserved.</p>
  </footer>


  <script>

    const endpoint = "https://script.google.com/macros/s/AKfycbzKGNNlKFnxO9qZ7tZ2n4kjxsJBSANnaolmsYDu6UUYYWXBVUl_RQSC2Na8r0Q6HXTUTw/exec";

    const payload = {
      page: document.title || "landing",
      tool: "convotools_homepage",
      userAgent: navigator.userAgent,
      referrer: document.referrer,
      screen: screen.width + "x" + screen.height,
      timestamp: new Date().toISOString()
    };

    fetch(endpoint, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    document.getElementById('upload').addEventListener('change', handleFile)

    function handleFile(event) {
      var loader = document.getElementById('loader');
      loader.style.display = 'block';

      const file = event.target.files[0]

      if (!file) return

      const reader = new FileReader()

      reader.onload = function (event) {

        const data = new Uint8Array(event.target.result)

        const workbook = XLSX.read(data, { type: 'array' })

        const sheetName = workbook.SheetNames[0]

        const sheet = workbook.Sheets[sheetName]

        const json = XLSX.utils.sheet_to_json(sheet)

        document.getElementById('json-output').value =
          JSON.stringify(json, null, 2)
        loader.style.display = 'none';
      }

      reader.readAsArrayBuffer(file)

    }

    function clearData() {

      document.getElementById('upload').value = ''
      document.getElementById('json-output').value = ''
      var loader = document.getElementById('loader');
      loader.style.display = 'none';
    }

  </script>

</body>

</html>
