<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConvoTools - JSON Beautifier</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Poppins, sans-serif
        }

        body {
            background: #f5f7fb;
            color: #333
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background: white;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05)
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: #2563eb
        }

        nav a {
            margin-left: 25px;
            text-decoration: none;
            color: #444;
            font-weight: 500
        }

        .converter {
            padding: 70px 8%;
        }

        .converter h2 {
            text-align: center;
            margin-bottom: 30px
        }

        .convert-box {
            max-width: 900px;
            margin: auto;
            text-align: center
        }

        textarea {
            width: 100%;
            height: 320px;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            resize: none;
            font-family: monospace;
            margin-bottom: 15px
        }

        button {
            padding: 12px 25px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-right: 10px
        }

        .clear-btn {
            background: #6b7280
        }

        footer {
            background: #111;
            color: #aaa;
            text-align: center;
            padding: 30px;
            margin-top: 60px
        }
    </style>
</head>

<body>

    <header>

        <a class="logo" href="./index.html">
            <img src="img/ConvoTools-s.png" alt="ConvoTools" style="width:150px;">
        </a>

        <nav>
            <a href="./index.html">Home</a>
            <a href="https://www.buymeacoffee.com/convotools" target="_blank">
                Buy me a coffee
            </a>
        </nav>

    </header>

    <section class="converter">

        <h2>JSON Beautifier</h2>

        <div class="convert-box">

            <textarea id="input" placeholder="Paste minified JSON here..."></textarea>

            <button onclick="beautifyJSON()">
                <i class="fa-solid fa-wand-magic-sparkles"></i> Beautify JSON
            </button>

            <button onclick="clearData()" class="clear-btn">
                Clear
            </button>

            <br>
            <br>

            <textarea id="output" placeholder="Beautified JSON will appear here..." readonly></textarea>

        </div>

    </section>

    <footer>
        <p>© 2026 ConvoTools. All rights reserved.</p>
    </footer>

    <script>

    const endpoint = "https://script.google.com/macros/s/AKfycbzKGNNlKFnxO9qZ7tZ2n4kjxsJBSANnaolmsYDu6UUYYWXBVUl_RQSC2Na8r0Q6HXTUTw/exec";

    const payload = {
      page: document.title || "landing",
      tool: "convotools_homepage",
      userAgent: navigator.userAgent,
      referrer: document.referrer,
      screen: screen.width + "x" + screen.height,
      timestamp: new Date().toISOString()
    };

    fetch(endpoint, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

        function beautifyJSON() {

            const input = document.getElementById("input").value

            try {

                const json = JSON.parse(input)

                document.getElementById("output").value =
                    JSON.stringify(json, null, 2)

            } catch (e) {

                alert("Invalid JSON")

            }

        }

        function clearData() {

            document.getElementById("input").value = ""
            document.getElementById("output").value = ""

        }

    </script>

</body>

</html>
