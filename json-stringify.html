<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ConvoTools - JSON Stringify</title>

    <link rel="icon" type="image/x-icon" href="img/ConvoTools-s.png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Poppins, sans-serif
        }

        body {
            background: #f5f7fb;
            color: #333
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background: white;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05)
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: #2563eb
        }

        nav a {
            margin-left: 25px;
            text-decoration: none;
            color: #444;
            font-weight: 500
        }

        .converter {
            padding: 46.6px 8%;
        }

        .converter h2 {
            text-align: center;
        }

        .tool-box {
            max-width: 1000px;
            margin: auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px
        }

        textarea {
            width: 100%;
            height: 320px;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            resize: none;
            font-family: monospace
        }

        .button-area {
            grid-column: span 2;
            text-align: center
        }

        button {
            padding: 12px 25px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px
        }

        footer {
            background: #111;
            color: #aaa;
            text-align: center;
            padding: 30px;
        }

        @media(max-width:768px) {

            .tool-box {
                grid-template-columns: 1fr
            }

            .button-area {
                grid-column: span 1
            }

        }
    </style>
</head>

<body>

    <header>

        <a class="logo" href="./index.html">
            <img src="img/ConvoTools-s.png" alt="ConvoTools" style="width:150px;">
        </a>

        <nav>
            <a href="./index.html">Home</a>
            <!-- <a href="https://www.buymeacoffee.com/convotools" target="_blank">Buy me a coffee</a> -->
        </nav>

    </header>


    <section class="converter">

        <h2>JSON Stringify Tool</h2><br>

        <div class="tool-box">

            <textarea id="input" placeholder="Paste JSON or text here..."></textarea>

            <textarea id="output" readonly placeholder="Stringified result will appear here..."></textarea>

            <div class="button-area">
                <button onclick="displayJson()">
                    <i class="fa-solid fa-code"></i> Stringify JSON
                </button>
                <button onclick="clearData()">
                    Clear Data
                </button>
            </div>

        </div>

    </section>


    <footer>
        <p>© 2026 ConvoTools. All rights reserved.</p>
    </footer>


    <script>

    const endpoint = "https://script.google.com/macros/s/AKfycbzKGNNlKFnxO9qZ7tZ2n4kjxsJBSANnaolmsYDu6UUYYWXBVUl_RQSC2Na8r0Q6HXTUTw/exec";

    const payload = {
      page: document.title || "landing",
      tool: "convotools_homepage",
      userAgent: navigator.userAgent,
      referrer: document.referrer,
      screen: screen.width + "x" + screen.height,
      timestamp: new Date().toISOString()
    };

    fetch(endpoint, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

        function displayJson() {

            var inputTextarea = document.getElementById("input");
            var outputTextarea = document.getElementById("output");

            var inputData = inputTextarea.value;

            try {

                outputTextarea.value = JSON.stringify(inputData);

            } catch (error) {

                outputTextarea.value = "Invalid JSON data:\\n" + error.message;

            }

        }

        function clearData() {
            var fileInput = document.getElementById('input');
            var nameInput = document.getElementById('output');
            fileInput.value = '';
            nameInput.value = '';
        }

    </script>

</body>

</html>
