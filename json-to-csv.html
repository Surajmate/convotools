<!DOCTYPE html>
<html>

<head>
    <title>ConvoTools - JSON to CSV</title>

    <style>
        body {
            font-family: Poppins;
            background: #f5f7fb;
            padding: 60px
        }

        textarea {
            width: 100%;
            height: 150px
        }

        button {
            width: 100%;
            padding: 12px;
            background: #2563eb;
            color: #fff
        }
    </style>
</head>

<body>

    <h2>JSON to CSV</h2>

    <textarea id="input"></textarea>

    <button onclick="convert()">Convert</button>

    <textarea id="output"></textarea>

    <script>
        function convert() {
            let json = JSON.parse(input.value);
            let keys = Object.keys(json[0]);
            let csv = keys.join(",") + "\n";

            json.forEach(row => {
                csv += keys.map(k => row[k]).join(",") + "\n";
            });

            output.value = csv;
        }
    </script>

</body>

</html>
