<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ConvoTools - JSON to Excel</title>

    <link rel="icon" type="image/x-icon" href="img/ConvoTools-f.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Poppins, sans-serif
    }

    body {
      background: #f5f7fb;
      color: #333
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 8%;
      background: white;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05)
    }

    .logo {
      font-size: 24px;
      font-weight: 700;
      color: #2563eb
    }

    nav a {
      margin-left: 25px;
      text-decoration: none;
      color: #444;
      font-weight: 500
    }

    .hero {
      padding: 80px 8%;
      text-align: center
    }

    .hero h1 {
      font-size: 46px;
      margin-bottom: 15px
    }

    .hero p {
      color: #666;
      margin-bottom: 30px
    }

    .hero button {
      padding: 14px 30px;
      border: none;
      background: #2563eb;
      color: white;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer
    }

    .tools {
      padding: 60px 8%
    }

    .tools h2 {
      text-align: center;
      margin-bottom: 40px;
      font-size: 32px
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 25px
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
      text-align: center;
      transition: 0.3s
    }

    .card i {
      font-size: 28px;
      color: #2563eb;
      margin-bottom: 15px
    }

    .card:hover {
      transform: translateY(-5px)
    }

    .converter {
      padding: 70px 8%;
      /* background: white */
    }

    .converter h2 {
      text-align: center;
      margin-bottom: 30px
    }

    .convert-box {
      max-width: 500px;
      margin: auto;
      text-align: center
    }

    .convert-box input,
    select {
      padding: 12px;
      width: 100%;
      margin-bottom: 15px;
      border: 1px solid #ddd;
      border-radius: 6px
    }

    .convert-box button {
      padding: 12px 25px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer
    }

    .result {
      margin-top: 15px;
      font-weight: 600
    }

    .features {
      padding: 70px 8%
    }

    .feature-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 30px
    }

    .feature {
      background: white;
      padding: 25px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05)
    }

    .feature i {
      font-size: 30px;
      color: #2563eb;
      margin-bottom: 10px
    }

    footer {
      background: #111;
      color: #aaa;
      text-align: center;
      padding: 30px;
      margin-top: 60px
    }
  </style>
</head>

<body>

  <header>
    <!-- <div class="logo">ConvoTools</div> -->
    <a class="logo" href="./index.html">
      <img src="img/ConvoTools-s.png" alt="ConvoTools" style="width: 150px;">
    </a>
    <nav>
      <a href="./index.html">Home</a>
      <!-- <a href="https://www.buymeacoffee.com/convotools" target="_blank">Buy me a coffee</a> -->
    </nav>
  </header>

  <section class="converter" id="converter">
    <h2>JSON File to Excel Converter</h2>
    <div class="convert-box" style="max-width:600px;">

      <label style="display:block;margin-bottom:6px;font-weight:500;">Select JSON File</label>
      <input type="file" id="jsonFileInput" style="background: white" accept=".json" />

      <label style="display:block;margin-top:10px;margin-bottom:6px;font-weight:500">Excel File Name</label>
      <input type="text" id="excelFileName" placeholder="Enter File Name" />

      <button onclick="handleFile()" style="width:100%">Convert to Excel</button>

      <div class="result" id="result"></div>

    </div>
  </section>

  <footer>
    <p>© 2026 ConvoTools. All rights reserved.</p>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.5/xlsx.full.min.js"></script>
  <script>

    const endpoint = "https://script.google.com/macros/s/AKfycbzKGNNlKFnxO9qZ7tZ2n4kjxsJBSANnaolmsYDu6UUYYWXBVUl_RQSC2Na8r0Q6HXTUTw/exec";

    const payload = {
      page: document.title || "landing",
      tool: "convotools_homepage",
      userAgent: navigator.userAgent,
      referrer: document.referrer,
      screen: screen.width + "x" + screen.height,
      timestamp: new Date().toISOString()
    };

    fetch(endpoint, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    function convertJSONtoExcel(jsonData, fileName) {
      var ws = XLSX.utils.json_to_sheet(jsonData)
      var wb = XLSX.utils.book_new()
      XLSX.utils.book_append_sheet(wb, ws, 'Sheet1')
      XLSX.writeFile(wb, fileName + '.xlsx')
    }

    function handleFile() {
      var input = document.getElementById('jsonFileInput')
      var file = input.files[0]
      var excelFileName = document.getElementById('excelFileName').value || 'output'

      if (file) {
        var reader = new FileReader()

        reader.onload = function (e) {
          try {
            var jsonData = JSON.parse(e.target.result)
            convertJSONtoExcel(jsonData, excelFileName)
            document.getElementById('result').innerText = 'Excel file downloaded successfully.'
          } catch (error) {
            console.error('Error parsing JSON file:', error)
            alert('Error parsing JSON file. Please check the file format.')
          }
        }

        reader.readAsText(file)
      } else {
        alert('Please select a JSON file.')
      }
    }

  </script>

</body>

</html>
