<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>ConvoTools - JSON to Table</title>

    <link rel="icon" type="image/x-icon" href="img/ConvoTools-head.png">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Poppins, sans-serif
    }

    body {
      background: #f5f7fb;
      color: #333
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 8%;
      background: white;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05)
    }

    .logo {
      font-size: 24px;
      font-weight: 700;
      color: #2563eb
    }

    nav a {
      margin-left: 25px;
      text-decoration: none;
      color: #444;
      font-weight: 500
    }

    .converter {
      padding: 70px 8%;
      /* background: white */
    }

    .converter h2 {
      text-align: center;
      margin-bottom: 30px
    }

    .convert-box {
      max-width: 900px;
      margin: auto;
      text-align: center
    }

    textarea {
      width: 100%;
      height: 180px;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      resize: none;
      font-family: monospace;
      margin-bottom: 15px
    }

    button {
      padding: 12px 25px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-right: 10px
    }

    .clear-btn {
      background: #6b7280
    }

    .table-container {
      margin-top: 25px;
      border: 1px solid #ddd;
      border-radius: 8px;
      overflow-x: auto;
      background: white
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 600px
    }

    table,
    th,
    td {
      border: 1px solid #ddd
    }

    th,
    td {
      padding: 10px;
      text-align: left
    }

    th {
      background: #f4f4f4;
      position: sticky;
      top: 0
    }

    footer {
      background: #111;
      color: #aaa;
      text-align: center;
      padding: 30px;
      margin-top: 60px
    }
  </style>
</head>

<body>

  <header>

    <a class="logo" href="./index.html">
      <img src="img/convoTools-g.png" alt="ConvoTools" style="width: 150px;">
    </a>

    <nav>
      <a href="./index.html">Home</a>
      <!-- <a href="https://www.buymeacoffee.com/convotools" target="_blank">
        Buy me a coffee
      </a> -->
    </nav>

  </header>


  <section class="converter">

    <h2>JSON to Table Converter</h2>

    <div class="convert-box">

      <textarea id="jsonInput" placeholder="Paste your JSON array here..."></textarea>

      <button onclick="convertJSONtoTable()">
        <i class="fa-solid fa-table"></i> Convert to Table
      </button>

      <button onclick="clearData()" class="clear-btn">
        Clear Data
      </button>

      <div class="table-container" id="tableContainer"></div>

    </div>

  </section>


  <footer>
    <p>© 2026 ConvoTools. All rights reserved.</p>
  </footer>


  <script>

    const endpoint = "https://script.google.com/macros/s/AKfycbzKGNNlKFnxO9qZ7tZ2n4kjxsJBSANnaolmsYDu6UUYYWXBVUl_RQSC2Na8r0Q6HXTUTw/exec";

    const payload = {
      page: document.title || "landing",
      tool: "convotools_homepage",
      userAgent: navigator.userAgent,
      referrer: document.referrer,
      screen: screen.width + "x" + screen.height,
      timestamp: new Date().toISOString()
    };

    fetch(endpoint, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    function convertJSONtoTable() {

      const input = document.getElementById('jsonInput').value

      try {

        const jsonData = JSON.parse(input)

        if (!Array.isArray(jsonData)) {
          alert("Please provide a JSON array.")
          return
        }

        const tableContainer = document.getElementById('tableContainer')
        tableContainer.innerHTML = ""

        const table = document.createElement('table')
        const thead = document.createElement('thead')
        const tbody = document.createElement('tbody')

        const headers = Object.keys(jsonData[0])

        const headerRow = document.createElement('tr')

        headers.forEach(header => {
          const th = document.createElement('th')
          th.textContent = header
          headerRow.appendChild(th)
        })

        thead.appendChild(headerRow)

        jsonData.forEach(item => {
          const row = document.createElement('tr')

          headers.forEach(header => {
            const td = document.createElement('td')
            td.textContent = item.hasOwnProperty(header) ? item[header] : '0'
            row.appendChild(td)
          })

          tbody.appendChild(row)
        })

        table.appendChild(thead)
        table.appendChild(tbody)

        tableContainer.appendChild(table)

      }
      catch (error) {
        alert("Invalid JSON format. Please check your input.")
      }

    }

    function clearData() {
      document.getElementById('jsonInput').value = ''
      document.getElementById('tableContainer').innerHTML = ''
    }

  </script>

</body>

</html>
