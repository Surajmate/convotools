<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ConvoTools - Payment QR Code Generator</title>

    <link rel="icon" type="image/x-icon" href="img/ConvoTools-head.png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Poppins, sans-serif
        }

        body {
            background: #f5f7fb;
            color: #333
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background: white;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05)
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: #2563eb
        }

        nav a {
            margin-left: 25px;
            text-decoration: none;
            color: #444;
            font-weight: 500
        }

        .converter {
            padding: 46.6px 8%;
        }

        .converter h2 {
            text-align: center;
        }

        .tool-box {
            max-width: 1000px;
            margin: auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px
        }

        textarea {
            width: 100%;
            height: 320px;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            resize: none;
            font-family: monospace
        }

        .button-area {
            grid-column: span 2;
            text-align: center
        }

        button {
            padding: 12px 25px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px
        }

        footer {
            background: #111;
            color: #aaa;
            text-align: center;
            padding: 30px;
        }

        @media(max-width:768px) {

            .tool-box {
                grid-template-columns: 1fr
            }

            .button-area {
                grid-column: span 1
            }

        }
    </style>
</head>

<body>

    <header>

        <a class="logo" href="./index.html">
            <img src="img/convoTools-g.png" alt="ConvoTools" style="width: 150px;">
        </a>

        <nav>
            <a href="./index.html">Home</a>
            <!-- <a href="https://www.buymeacoffee.com/convotools" target="_blank">
                Buy me a coffee
            </a> -->
        </nav>

    </header>

    <section class="converter">

        <h2>Payment QR Generator</h2>

        <div class="convert-box">

            <div class="form-group">
                <label for="amount">Amount</label>
                <input type="number" id="amount" placeholder="Enter amount" step="0.01">
            </div>

            <div class="form-group">
                <label for="upiId">UPI ID</label>
                <input type="text" id="upiId" placeholder="user@upi">
            </div>

            <button onclick="generateQR()">Generate QR Code</button>
            <div id="qrCode"></div>
        </div>

    </section>

    <footer>
        <p>© 2026 ConvoTools. All rights reserved.</p>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        function generateQR() {
            const amount = document.getElementById('amount').value;
            const upiId = document.getElementById('upiId').value;

            if (!amount || !upiId) {
                alert('Please fill all fields');
                return;
            }

            const upiString = `upi://pay?pa=${upiId}&am=${amount}`;
            const qrDiv = document.getElementById('qrCode');
            qrDiv.innerHTML = '';

            new QRCode(qrDiv, {
                text: upiString,
                width: 256,
                height: 256
            });
        }
    </script>
</body>

</html>
