<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>ConvoTools - SIP Calculator</title>

    <link rel="icon" type="image/x-icon" href="img/ConvoTools-head.png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Poppins
        }

        body {
            background: #f5f7fb
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background: #fff
        }

        .converter {
            padding: 70px 8%
        }

        .converter h2 {
            text-align: center;
            margin-bottom: 30px
        }

        .convert-box {
            max-width: 600px;
            margin: auto;
            text-align: center
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 6px
        }

        button {
            width: 100%;
            padding: 12px;
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 6px;
            margin-bottom: 10px
        }

        .clear-btn {
            background: #6b7280
        }

        .loader {
            display: none;
            margin-top: 10px
        }

        .spinner {
            border: 4px solid #eee;
            border-top: 4px solid #2563eb;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            animation: spin 1s linear infinite;
            margin: auto
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg)
            }
        }

        .result {
            margin-top: 15px;
            font-weight: 600
        }

        footer {
            background: #111;
            color: #aaa;
            text-align: center;
            padding: 30px;
            margin-top: 60px
        }
    </style>
</head>

<body>

    <header>

    <a class="logo" href="./index.html">
      <img src="img/convotools.gif" alt="ConvoTools" style="width: 150px;">
    </a>

    <nav>
      <a href="./index.html">Home</a>
      <!-- <a href="https://www.buymeacoffee.com/convotools" target="_blank">
        Buy me a coffee
      </a> -->
    </nav>

  </header>

    <section class="converter">
        <h2>SIP Calculator</h2>

        <div class="convert-box">

            <input type="number" id="amount" placeholder="Monthly Investment (₹)">
            <input type="number" id="rate" placeholder="Expected Return (%)">
            <input type="number" id="years" placeholder="Time (Years)">

            <button onclick="calculateSIP()"><i class="fa-solid fa-chart-line"></i> Calculate SIP</button>
            <button onclick="clearData()" class="clear-btn">Clear</button>

            <div class="loader" id="loader">
                <div class="spinner"></div>
            </div>

            <div class="result" id="result"></div>

        </div>
    </section>

    <footer>
        <p>© 2026 ConvoTools</p>
    </footer>

    <script>
        function calculateSIP() {
            loader.style.display = "block";

            setTimeout(() => {
                let P = amount.value;
                let r = rate.value / 12 / 100;
                let n = years.value * 12;

                let FV = P * ((Math.pow(1 + r, n) - 1) / r) * (1 + r);

                result.innerText = "Future Value: ₹" + FV.toFixed(2);
                loader.style.display = "none";
            }, 500);
        }

        function clearData() {
            amount.value = ""; rate.value = ""; years.value = ""; result.innerText = "";
        }
    </script>

</body>

</html>
