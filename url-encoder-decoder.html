<!DOCTYPE html>
<html>

<head>
    <title>ConvoTools - URL Tool</title>

    <link rel="icon" type="image/x-icon" href="img/ConvoTools-s.png">

    <style>
        body {
            font-family: Poppins;
            background: #f5f7fb;
            padding: 60px
        }

        textarea {
            width: 100%;
            height: 120px;
            margin-bottom: 10px
        }

        button {
            width: 100%;
            padding: 12px;
            background: #2563eb;
            color: #fff;
            margin-bottom: 10px
        }
    </style>
</head>

<body>

    <h2>URL Encoder / Decoder</h2>

    <textarea id="input"></textarea>

    <button onclick="encode()">Encode</button>
    <button onclick="decode()">Decode</button>

    <textarea id="output"></textarea>

    <script>
        function encode() { output.value = encodeURIComponent(input.value); }
        function decode() { output.value = decodeURIComponent(input.value); }
    </script>

</body>

</html>
