<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>ConvoTools - UUID Generator</title>

    <link rel="icon" type="image/x-icon" href="img/ConvoTools-head.png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: Poppins
        }

        body {
            background: #f5f7fb
        }

        header {
            padding: 20px 8%;
            background: #fff
        }

        .converter {
            padding: 70px 8%
        }

        .convert-box {
            max-width: 600px;
            margin: auto;
            text-align: center
        }

        button {
            padding: 12px;
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 6px;
            width: 100%
        }

        textarea {
            width: 100%;
            height: 120px;
            margin-top: 15px
        }
    </style>
</head>

<body>

    <header>

    <a class="logo" href="./index.html">
      <img src="img/convotools.gif" alt="ConvoTools" style="width: 150px;">
    </a>

    <nav>
      <a href="./index.html">Home</a>
      <!-- <a href="https://www.buymeacoffee.com/convotools" target="_blank">
        Buy me a coffee
      </a> -->
    </nav>

  </header>

    <section class="converter">

        <h2>UUID Generator</h2>

        <div class="convert-box">

            <button onclick="generateUUID()">
                <i class="fa-solid fa-fingerprint"></i> Generate UUID
            </button>

            <textarea id="output" readonly></textarea>

        </div>
    </section>

    <script>
        function generateUUID() {
            document.getElementById("output").value = crypto.randomUUID();
        }
    </script>

</body>

</html>
